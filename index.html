<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>자기소개 페이지</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #b8c9d9;
        margin: 20px;
      }
      h1 {
        color: #2c3e50;
      }
      .box {
        background-color: white;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        box-shadow: 2px 2px 5px gray;
      }
    </style>
  </head>
  <body>
    <h1>[자기소개]</h1>

    <div class="box">
      <h2>장단희</h2>
      <p><strong>1-3반 (IoT과)</strong></p>
      <p><strong>전공:</strong> 프론트엔드</p>
    </div>

    <div class="box">
      <h2>좋아하는 것♡</h2>
      <ul>
        <li>그림 그리기</li>
        <li>독서</li>
        <li>음악 듣기</li>
      </ul>
    </div>

    <div class="box">
      <h2>요즘 나의 관심사☆</h2>
      <p>프로그래밍 공부 (Python, HTML, CSS 등)</p>
    </div>

    <div class="box">
      <h2>목표!</h2>
      <p>멋진 프론트엔드 개발자가 되는 것!</p>
    </div>
  </body>
</html>
